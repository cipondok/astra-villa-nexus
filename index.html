    <script>
      (function() {
        var key = 'astra-villa-theme';
        var saved = null;
        try { saved = localStorage.getItem(key); } catch(e) {}
        var theme = saved || 'system';
        var isDark = false;
        if (theme === 'astra-black-gold' || theme === 'dark') isDark = true;
        else if (theme === 'system') isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        else isDark = false;
        var root = document.documentElement;
        if (isDark) {
          root.classList.add('dark', 'astra-black-gold');
          root.setAttribute('data-theme', 'astra-black-gold');
        } else {
          root.classList.add('light', 'astra-pearl-white');
          root.setAttribute('data-theme', 'astra-pearl-white');
        }
      })();
    </script>
